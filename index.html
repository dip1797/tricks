<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kachuful Scorekeeper</title>

  <!-- Optional live sync. Snapshot/local scorekeeping works without Firebase. -->
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Nunito+Sans:wght@400;600;700;800;900&display=swap');

    :root {
      color-scheme: light;
      --felt: #111827;
      --felt2: #020617;
      --gold: #fbbf24;
      --accent-main: #7c3aed;
      --accent-dark-main: #1e1b4b;
      --ink: #0f172a;
      --muted: #64748b;
      --paper: #ffffff;
      --line: rgba(15,23,42,.12);
      --nav-h: 76px;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Nunito Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, rgba(124,58,237,.22), transparent 36rem),
        radial-gradient(circle at 100% 0%, rgba(251,191,36,.18), transparent 30rem),
        linear-gradient(140deg, #f8fafc 0%, #eef2ff 52%, #fff7ed 100%);
      -webkit-tap-highlight-color: transparent;
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; touch-action: manipulation; }
    input, textarea { min-width: 0; }

    .safe-top { padding-top: calc(14px + env(safe-area-inset-top)); }
    .safe-bottom { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    .page { min-height: 100vh; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px); }
    .no-nav { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    .wrap { width: min(1180px, calc(100% - 24px)); margin: 0 auto; }

    .felt {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 10%, rgba(168,85,247,.30), transparent 15rem),
        radial-gradient(circle at 90% 0%, rgba(251,191,36,.26), transparent 20rem),
        radial-gradient(circle at 75% 85%, rgba(14,165,233,.18), transparent 18rem),
        linear-gradient(135deg, #0f172a, #1e1b4b 56%, #020617);
      color: white;
    }
    .felt:before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: .8;
      pointer-events: none;
    }
    .felt:after {
      content: "♠  ♦  ♣  ♥";
      position: absolute;
      right: -1.4rem;
      bottom: -.9rem;
      font-weight: 900;
      letter-spacing: .16em;
      font-size: clamp(3.6rem, 13vw, 8rem);
      color: rgba(255,255,255,.06);
      pointer-events: none;
      transform: rotate(-5deg);
    }
    .on-felt { position: relative; z-index: 1; }

    .glass {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(255,255,255,.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 55px rgba(15,23,42,.10);
    }
    .card {
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 14px 38px rgba(15,23,42,.08);
    }
    .mini-card {
      background: white;
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 8px 20px rgba(15,23,42,.07);
    }

    .hero { border-radius: 0 0 30px 30px; padding: 14px 0 78px; box-shadow: 0 18px 50px rgba(30,27,75,.24); }
    .hero-row { display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; }
    .hero h1 { margin: 6px 0 0; font-family: "Anton", "Nunito Sans", sans-serif; font-size: clamp(2.7rem, 11vw, 6.5rem); line-height: .92; letter-spacing: .01em; font-weight: 400; text-transform: uppercase; }
    .brand-title { margin: 12px 0 0; font-family: "Anton", "Nunito Sans", sans-serif; font-size: clamp(3.3rem, 17vw, 8.5rem); line-height: .9; letter-spacing: .015em; font-weight: 400; text-transform: uppercase; white-space: nowrap; }
    .eyebrow { margin: 0; color: rgba(255,255,255,.72); font-size: .68rem; letter-spacing: .22em; text-transform: uppercase; font-weight: 900; }
    .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .hero-btn { color: white; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); border-radius: 16px; padding: 10px 12px; font-size: .72rem; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .hero-btn:active { transform: scale(.98); }

    .pull-up { margin-top: -56px; position: relative; z-index: 2; }
    .section-title { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin: 0 0 14px; }
    .section-title h2 { margin: 0; font-size: 1.55rem; line-height: 1; letter-spacing: -.04em; font-weight: 900; }
    .section-title p { margin: 0; font-size: .72rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: .12em; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 20px;
      padding: 14px 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      min-height: 48px;
      text-decoration: none;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { color: white; background: linear-gradient(135deg, #7c3aed, #1e1b4b); box-shadow: 0 16px 32px rgba(76,29,149,.25); }
    .btn-gold { color: white; background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 16px 32px rgba(217,119,6,.22); }
    .btn-dark { color: white; background: #0f172a; box-shadow: 0 16px 32px rgba(15,23,42,.20); }
    .btn-light { color: #0f172a; background: white; border: 1px solid rgba(15,23,42,.10); box-shadow: 0 8px 20px rgba(15,23,42,.07); }
    .btn-red { color: white; background: linear-gradient(135deg, #ef4444, #991b1b); }
    .btn-full { width: 100%; }
    .btn[disabled] { opacity: .45; cursor: not-allowed; }

    .grid-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 760px) {
      .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .hero { border-radius: 0 0 44px 44px; padding-bottom: 94px; }
      .pull-up { margin-top: -70px; }
    }

    .choice-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    @media (min-width: 900px) { .choice-grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    .choice {
      border-radius: 20px;
      padding: 14px;
      text-align: left;
      background: white;
      color: #0f172a;
      border: 1px solid rgba(15,23,42,.10);
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }
    .choice strong { display: block; font-size: .98rem; line-height: 1.05; }
    .choice span { display: block; margin-top: 5px; color: #64748b; font-size: .75rem; font-weight: 800; line-height: 1.25; }
    .choice.active { background: #312e81; color: white; border-color: #312e81; box-shadow: 0 14px 30px rgba(49,46,129,.22); }
    .choice.active span { color: rgba(255,255,255,.74); }
    .choice.clean strong, .choice-grid.three .choice strong { text-align: center; font-size: 1.02rem; }
    .clean-help { font-size: .72rem; opacity: .9; }

    .setup-card { border-radius: 28px; padding: 16px; }
    .field-label { display: block; margin: 0 0 10px; color: #64748b; font-size: .68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .18em; }
    .help { margin: 8px 0 0; color: #64748b; font-size: .78rem; font-weight: 700; line-height: 1.35; }
    .input {
      width: 100%;
      border: 1px solid rgba(15,23,42,.12);
      background: #f8fafc;
      border-radius: 18px;
      padding: 14px 14px;
      outline: none;
      font-weight: 900;
      color: #0f172a;
    }
    .textarea { min-height: 88px; resize: vertical; }

    .stepper { display: grid; grid-template-columns: 44px minmax(48px,1fr) 44px; align-items: center; gap: 8px; }
    .stepper.small { grid-template-columns: 40px minmax(40px,1fr) 40px; gap: 6px; }
    .step-btn {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: #f1f5f9;
      color: #0f172a;
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: inset 0 -2px 0 rgba(15,23,42,.05);
    }
    .stepper.small .step-btn { width: 40px; height: 40px; border-radius: 14px; font-size: 1.35rem; }
    .step-value { text-align: center; font-size: 2.25rem; font-weight: 900; letter-spacing: -.06em; line-height: 1; font-variant-numeric: tabular-nums; }
    .stepper.small .step-value { font-size: 1.85rem; }

    .preview { display: flex; flex-wrap: wrap; gap: 6px; }
    .preview span { border-radius: 999px; background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; padding: 7px 10px; font-size: .78rem; font-weight: 900; }
    .preview .more { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }

    .name-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    @media (min-width: 760px) { .name-grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }
    .name-field {
      --accent: #7c3aed;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      border-radius: 18px;
      padding: 9px;
      background: white;
      border: 1px solid rgba(15,23,42,.10);
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }
    .name-main { min-width: 0; flex: 1; }
    .name-num { width: 38px; height: 38px; border-radius: 14px; background: var(--accent); color: white; display: grid; place-items: center; font-weight: 900; flex: 0 0 auto; }
    .name-field input { border: 0; outline: 0; min-width: 0; width: 100%; font-weight: 900; text-transform: uppercase; font-size: .95rem; background: transparent; color: #0f172a; }
    .color-options { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .color-dot { width: 22px; height: 22px; border-radius: 999px; background: var(--dot); border: 2px solid white; box-shadow: 0 0 0 1px rgba(15,23,42,.16), 0 3px 8px rgba(15,23,42,.12); padding: 0; }
    .color-dot.selected { box-shadow: 0 0 0 3px white, 0 0 0 5px var(--dot), 0 8px 16px rgba(15,23,42,.16); transform: translateY(-1px); }

    .score-strip { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
    @media (min-width: 760px) { .score-strip { grid-template-columns: repeat(3, minmax(0,1fr)); } }
    @media (min-width: 1050px) { .score-strip { grid-template-columns: repeat(6, minmax(0,1fr)); } }
    .score-chip {
      --accent: #7c3aed;
      border-radius: 18px;
      background: white;
      border: 1px solid rgba(15,23,42,.08);
      padding: 9px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }
    .score-chip.active { box-shadow: 0 0 0 3px rgba(124,58,237,.18), 0 10px 24px rgba(15,23,42,.08); border-color: var(--accent); }
    .avatar { width: 36px; height: 36px; border-radius: 13px; background: var(--accent); color: white; display: grid; place-items: center; font-size: .78rem; font-weight: 900; flex: 0 0 auto; }
    .score-chip .nm { display: block; font-size: .78rem; font-weight: 900; line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
    .score-chip .pts { display: block; margin-top: 3px; font-size: .85rem; font-weight: 900; color: #3730a3; }

    .round-info { border-radius: 26px; padding: 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
    .round-info h2 { margin: 0; font-size: 2.25rem; letter-spacing: -.07em; line-height: .95; font-weight: 900; }
    .round-info p { margin: 3px 0 0; color: #64748b; font-weight: 800; font-size: .82rem; }
    .trump-badge { min-width: 76px; border-radius: 22px; padding: 12px; text-align: center; background: #f8fafc; border: 1px solid rgba(15,23,42,.08); }
    .trump-badge .suit { font-size: 2.2rem; line-height: 1; font-weight: 900; }
    .trump-badge .label { margin-top: 4px; color: #64748b; font-size: .62rem; letter-spacing: .13em; text-transform: uppercase; font-weight: 900; }

    .player-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    @media (min-width: 760px) { .player-grid { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; } }
    @media (min-width: 1140px) { .player-grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }
    .player-tile {
      --accent: #7c3aed;
      --accent-dark: #1e1b4b;
      --soft: #ede9fe;
      border-radius: 24px;
      padding: 10px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 14px 28px rgba(15,23,42,.08);
      min-width: 0;
    }
    .player-tile.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,.18), 0 16px 34px rgba(15,23,42,.10); }
    .correction-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 700px) { .correction-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; } }
    @media (min-width: 1120px) { .correction-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    .correction-tile { overflow: hidden; }
    .edit-controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .edit-control { min-width: 0; border-radius: 18px; padding: 9px; background: #f8fafc; border: 1px solid rgba(15,23,42,.08); }
    .edit-control.actual { background: #fff7ed; }
    .edit-control .field-label { margin-bottom: 7px; }
    .edit-control .stepper.small { grid-template-columns: 38px minmax(30px, 1fr) 38px; gap: 5px; }
    .edit-control .stepper.small .step-btn { width: 38px; height: 38px; border-radius: 14px; }
    .edit-control .stepper.small .step-value { font-size: 1.65rem; }
    .edit-score-meta { margin-top: 10px; padding: 10px 2px 0; border-top: 1px solid rgba(15,23,42,.07); }
    @media (max-width: 340px) { .edit-controls { grid-template-columns: 1fr; } }
    .player-name {
      border-radius: 18px;
      padding: 10px 10px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      display: grid;
      grid-template-columns: 36px minmax(0,1fr);
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .player-name .avatar { background: white; color: var(--accent-dark); width: 36px; height: 36px; border-radius: 14px; }
    .player-name .small { display: block; font-size: .58rem; color: rgba(255,255,255,.72); font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .player-name .big { display: block; font-size: .98rem; color: white; font-weight: 900; line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; }
    .tile-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 8px 2px 0; color: #64748b; font-size: .72rem; font-weight: 900; }
    .tile-meta b { color: #0f172a; }
    .status-pill { border-radius: 999px; padding: 6px 8px; font-size: .68rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .ok { background: #dbeafe; color: #1d4ed8; }
    .bad { background: #ffe4e6; color: #be123c; }
    .warn { background: #fef3c7; color: #92400e; }

    .action-panel { margin-top: 12px; border-radius: 26px; padding: 12px; display: grid; gap: 10px; }
    @media (min-width: 760px) { .action-panel { grid-template-columns: 1fr auto; align-items: center; } }
    .total-box { border-radius: 20px; padding: 13px; background: #f8fafc; border: 1px solid rgba(15,23,42,.08); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .total-box.bid-invalid { background: #fff1f2; border-color: #fecdd3; box-shadow: inset 0 0 0 1px rgba(225,29,72,.08); }
    .total-box strong { font-size: 2rem; font-weight: 900; letter-spacing: -.04em; font-variant-numeric: tabular-nums; }
    .total-box span { color: #64748b; font-size: .72rem; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; }
    .bid-rule-note { margin: 4px 0 0; color: #64748b; font-size: .78rem; font-weight: 800; line-height: 1.25; }
    .bid-rule-note.bad { color: #be123c; }
    .total-box.invalid { background: #fff1f2; border-color: #fecdd3; }
    .total-box.invalid strong { color: #e11d48; }
    .error { margin-top: 10px; border-radius: 20px; padding: 12px 14px; background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; font-weight: 900; }

    .result-list { display: grid; gap: 10px; }
    @media (min-width: 760px) { .result-list { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    .result-item { --accent:#7c3aed; border-radius: 22px; padding: 12px; background: white; border: 1px solid rgba(15,23,42,.08); display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    .result-item h3 { margin: 0; font-size: 1.08rem; line-height: 1.05; font-weight: 900; text-transform: uppercase; }
    .result-item p { margin: 4px 0 0; color: #64748b; font-size: .75rem; font-weight: 900; text-transform: uppercase; letter-spacing: .08em; }
    .score-number { font-size: 2rem; line-height: 1; font-weight: 900; font-variant-numeric: tabular-nums; }
    .pos { color: #0d9488; } .neg { color: #e11d48; } .zero { color: #94a3b8; }

    .bottom-nav {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 60;
      background: rgba(255,255,255,.92);
      border-top: 1px solid rgba(15,23,42,.10);
      backdrop-filter: blur(18px);
      box-shadow: 0 -14px 38px rgba(15,23,42,.09);
    }
    .nav-grid { width: min(640px, 100%); margin: 0 auto; padding: 7px 8px; display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
    .nav-btn { border-radius: 16px; padding: 9px 4px; background: transparent; color: #475569; font-size: .65rem; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; }
    .nav-btn .ico { display:block; font-size: 1.12rem; margin-bottom: 2px; }
    .nav-btn.active { background: #eef2ff; color: #3730a3; }
    .nav-btn.danger { color: #e11d48; }

    .modal-backdrop { position: fixed; inset: 0; z-index: 100; background: rgba(15,23,42,.74); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: max(10px, env(safe-area-inset-top)) 10px max(10px, env(safe-area-inset-bottom)); }
    .modal { width: min(1120px, calc(100vw - 20px)); max-height: calc(100dvh - 20px); overflow: hidden; display: flex; flex-direction: column; border-radius: 28px; background: white; box-shadow: 0 24px 90px rgba(0,0,0,.28); }
    .modal-head { padding: 14px; color: white; flex: 0 0 auto; }
    .modal-head-row { position: relative; z-index: 3; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .modal-head-row > div { min-width: 0; }
    .modal-title { margin: 0; font-size: 1.35rem; font-weight: 900; letter-spacing: -.04em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-body { overflow: auto; padding: 14px; -webkit-overflow-scrolling: touch; }
    .close { flex: 0 0 40px; width: 40px; height: 40px; display: grid; place-items: center; border-radius: 15px; background: rgba(255,255,255,.18); color: white; border: 1px solid rgba(255,255,255,.24); font-size: 1.35rem; font-weight: 900; line-height: 1; position: relative; z-index: 5; }

    .summary-mobile { display: grid; gap: 10px; }
    .summary-desktop { display: none; overflow: auto; }
    @media (min-width: 820px) { .summary-mobile { display:none; } .summary-desktop { display:block; } }
    .modal .summary-mobile { display: none; }
    .modal .summary-desktop { display: block; overflow: auto; -webkit-overflow-scrolling: touch; border: 1px solid #e2e8f0; border-radius: 18px; }
    .modal .summary-desktop table { min-width: 760px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: center; vertical-align: middle; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; color: #475569; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; }
    td:first-child, th:first-child { text-align: left; position: sticky; left: 0; background: inherit; z-index: 2; }
    th:first-child { background:#f8fafc; z-index: 3; }

    .share-grid { display: grid; gap: 10px; }
    @media (min-width: 760px) { .share-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    .share-card { border-radius: 24px; padding: 14px; border: 1px solid rgba(15,23,42,.10); background: #f8fafc; }
    .share-card h3 { margin: 0 0 5px; font-size: 1.15rem; font-weight: 900; text-transform: uppercase; letter-spacing: .03em; }

      .choice span { font-size: .68rem; }

      .modal { width: calc(100vw - 16px); max-height: calc(100dvh - 16px); border-radius: 24px; }
      .modal-head { padding: 12px; }

      .round-info { border-radius: 22px; padding: 12px; }
